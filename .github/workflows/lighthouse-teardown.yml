name: Teardown Lighthouse Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DESTROY_LIGHTHOUSE to confirm teardown"
        required: true
        type: string

concurrency:
  group: lighthouse-teardown
  cancel-in-progress: false

env:
  TF_WORKING_DIR: lighthouse/terraform

jobs:
  teardown:
    name: Terraform Destroy
    if: ${{ github.event.inputs.confirmation == 'DESTROY_LIGHTHOUSE' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Disable ALB deletion protection in state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_DEFAULT_REGION }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_lhci_admin_api_key: ${{ secrets.LHCI_ADMIN_API_KEY }}
          TF_VAR_enable_deletion_protection: false
        run: terraform apply -auto-approve

      - name: Terraform destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_DEFAULT_REGION }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_lhci_admin_api_key: ${{ secrets.LHCI_ADMIN_API_KEY }}
          TF_VAR_enable_deletion_protection: false
        run: terraform destroy -auto-approve

  confirmation-mismatch:
    name: Invalid confirmation
    if: ${{ github.event.inputs.confirmation != 'DESTROY_LIGHTHOUSE' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail with clear confirmation message
        run: |
          echo "Confirmation mismatch. Type DESTROY_LIGHTHOUSE to run teardown."
          exit 1